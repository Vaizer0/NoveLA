name: Publish Release

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

permissions:
  contents: write

jobs:
  buildRelease:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Set up JDK enviroment
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' 
          java-version: 21

      - name: Setup Python enviroment
        uses: actions/setup-python@v2
        with:
          python-version: 3.11

      - name: Setup Gradle version to 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Setup APK signing
        run: |
          echo -n ${{ secrets.SIGNING_KEY }} | base64 -d > app/storeFile.jsk
          echo storeFile=storeFile.jsk > custom.properties
          echo storePassword=${{ secrets.KEY_STORE_PASSWORD }} >> custom.properties
          echo keyAlias=${{ secrets.ALIAS }} >> custom.properties
          echo keyPassword=${{ secrets.KEY_PASSWORD }} >> custom.properties

      - name: Build app
        run: |
          gradle assembleRelease -PlocalPropertiesFilePath=custom.properties

      - name: Set release version
        run: |
          echo "APP_VERSION=$(sed -n 's/^[[:space:]]*versionName = "\(.*\)"$/\1/p' app/build.gradle.kts | head -n 1)" >> "$GITHUB_ENV"

      - name: Collect release APK
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' -exec cp {} release-artifacts/ \;
          ls -lah release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: NovelDokusha v${{ env.APP_VERSION }}
          tag_name: v${{ env.APP_VERSION }}
          files: |
            release-artifacts/*.apk
