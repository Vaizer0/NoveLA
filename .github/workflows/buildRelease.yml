name: Build & Publish

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'test'
        type: choice
        options:
          - test      # Upload artifact only, no release
          - release   # Create a draft GitHub Release

permissions:
  contents: write

jobs:
  build:
    name: Build APK (${{ inputs.build_type }})
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v7

      - name: Set up JDK environment
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup APK signing
        run: |
          echo -n ${{ secrets.SIGNING_KEY }} | base64 -d > app/storeFile.jks
          echo storeFile=storeFile.jks          > custom.properties
          echo storePassword=${{ secrets.KEY_STORE_PASSWORD }} >> custom.properties
          echo keyAlias=${{ secrets.ALIAS }}    >> custom.properties
          echo keyPassword=${{ secrets.KEY_PASSWORD }} >> custom.properties

      - name: Remove local Java home from gradle.properties
        run: sed -i '/org\.gradle\.java\.home/d' gradle.properties

      - name: Build release APK
        run: ./gradlew assembleRelease -PlocalPropertiesFilePath=custom.properties

      - name: Set app version
        run: |
          echo "APP_VERSION=$(sed -n 's/^[[:space:]]*versionName = "\(.*\)"$/\1/p' app/build.gradle.kts | head -n 1)" >> "$GITHUB_ENV"

      - name: Collect APKs
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' \
            -exec cp {} release-artifacts/ \;
          ls -lah release-artifacts

      # ── Test build: upload as workflow artifact (no release) ────────────────
      - name: Upload APK artifact (test build)
        if: inputs.build_type == 'test'
        uses: actions/upload-artifact@v7
        with:
          name: NoveLA-v${{ env.APP_VERSION }}-test
          path: release-artifacts/*.apk
          retention-days: 14

      # ── Release build: create a draft GitHub Release ─────────────────────────
      - name: Create draft release
        if: inputs.build_type == 'release'
        uses: softprops/action-gh-release@v3
        with:
          name: NoveLA v${{ env.APP_VERSION }}
          tag_name: v${{ env.APP_VERSION }}
          draft: true
          body: |
            <h1>
              <img src="https://raw.githubusercontent.com/Vaizer0/NoveLA/default/screenshots/NoveLA.png" alt="NoveLA" width="40" align="center">
              NoveLA — Light Novel Reader & Parser
            </h1>

            <details open>
            <summary><b>🇺🇸 English Version</b></summary>

            ### ✨ Floating TTS Overlay
            - **Double-tap** paragraph text to hide/show TTS menu controls
            - Outer container background hides with menu on double-tap for a compact, clean look
            - **Pinch-to-resize** the floating TTS panel width
            - **Long-press** paragraph text to toggle glow border
            - Paragraph background opacity now connected to the opacity slider
            - Simplified glow to a clean border-only style (removed shadow artifact)
            - Overall floating TTS looks cleaner, smaller, and tighter when collapsed

            ### ✨ Compact TTS Player Strip
            - **Start Here, Focus, Voices, and Saved Voices** now sit together on a single horizontal row (original icons + labels preserved), so the player stays small and minimal instead of spreading out
            - Controls are evenly spaced left-to-right and grouped neatly as a tidy player strip with comfortable tap size and no wasted padding
            - **Floating TTS** and **Show Outside App** toggles moved into their own single horizontal row directly below the control buttons
            - Horizontally scrollable on narrow screens so all buttons remain accessible
            - Bordered Surface card with comfortable spacing from voice speed slider

            ### ✨ Floating TTS Menu Enhancements
            - **Action buttons** (Start Here, Focus, Voices, Saved Voices) added above paragraph text in the floating TTS menu, matching the reader's main TTS menu style
            - **Paragraph-based progress %** — replaced duration timer with percentage based on current paragraph position within the chapter (e.g., 41%)
            - **Dynamic paragraph resizing** — padding adapts based on text length for better readability
            - Removed redundant "Start Here" from floating control bar (now in action buttons row)

            ### 🐛 Bug Fixes
            - Fixed black rectangle artifact appearing behind paragraph when glow is enabled
            - Fixed outer container not hiding properly on double-tap
            - Fixed paragraph opacity not responding to slider

            ### 🧹 Code Cleanup
            - Removed unused imports and shadow-related code
            - Minimal, safe change set — only floating TTS overlay modified

            </details>

            <details>
            <summary><b>🇷🇺 Russian Version</b></summary>

            ### ✨ Плавающее TTS-меню
            - **Двойное нажатие** на текст абзаца для скрытия/показа панели управления TTS
            - Внешний контейнер скрывается вместе с меню для компактного вида
            - ** pinch-to-resize** — изменение ширины плавающей панели жестом
            - **Долгое нажатие** на абзац для включения/выключения свечения
            - Прозрачность фона абзаца теперь управляется слайдером
            - Упрощён эффект свечения до чистой рамки

            ### ✨ Компактная панель TTS
            - **Start Here, Focus, Voices и Saved Voices** теперь расположены в одну горизонтальную строку (иконки и подписи сохранены), чтобы плеер оставался маленьким и компактным
            - Кнопки равномерно распределены слева направо и аккуратно сгруппированы в компактную панель с удобной зоной нажатия без лишних отступов
            - Переключатели **Floating TTS** и **Show Outside App** перенесены в отдельную горизонтальную строку под кнопками управления

            ### 🐛 Исправления
            - Исправлен чёрный прямоугольник за абзацем при включённом свечении
            - Исправлено скрытие внешнего контейнера при двойном нажатии

            </details>
          files: release-artifacts/*.apk